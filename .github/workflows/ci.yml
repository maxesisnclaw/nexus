name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  go-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download modules
        run: go mod download

      - name: Build (static)
        run: CGO_ENABLED=0 go build ./...

      - name: Vet
        run: go vet ./...

      - name: Install staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@v0.7.0
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Lint
        run: staticcheck ./...

      - name: Test
        run: go test -cover ./...

      - name: Race Test
        run: go test -race ./...

  linux-docker-integration:
    runs-on: ubuntu-latest
    needs: go-checks
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build test image
        run: docker build -t nexus-test -f Dockerfile.test .

      - name: Run Linux race tests in container
        run: docker run --rm -v ${{ github.workspace }}:/workspace -w /workspace nexus-test go test -v -race ./...

      - name: Run Linux integration tests in container
        run: docker run --rm --privileged -v ${{ github.workspace }}:/workspace -w /workspace nexus-test go test -v -tags integration ./...
