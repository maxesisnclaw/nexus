version: "3.9"

services:
  nexusd:
    build:
      context: .
      dockerfile: Dockerfile
    image: nexusd:local
    command: ["-config", "/etc/nexus/nexus.toml"]
    volumes:
      - ./examples/docker-compose/nexus.compose.toml:/etc/nexus/nexus.toml:ro
      - nexus-run:/run/nexus
    restart: unless-stopped

  docker-service:
    build:
      context: .
      dockerfile: ./examples/docker-service/Dockerfile
    image: nexus-example-docker-service:local
    environment:
      - NEXUS_SERVICE_SOCKET=/run/nexus/examples/docker-service.sock
    volumes:
      - nexus-run:/run/nexus
    depends_on:
      - nexusd

volumes:
  nexus-run:
