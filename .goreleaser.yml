version: 2

project_name: nexus

before:
  hooks:
    - go mod tidy
    - go vet ./...
    - go test ./...
    - go test -race ./...

builds:
  - id: nexusd
    main: ./cmd/nexusd
    binary: nexusd
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'

release:
  github:
    owner: maxesisnclaw
    name: nexus
